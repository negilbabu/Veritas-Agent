name: Keep Render Backend Alive

on:
  schedule:
    - cron: "*/14 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install python-dotenv

      - name: Run Keep Alive Script
        env:
          # This securely pulls the URL from your GitHub Settings!
          # It is never exposed in the code.
          RENDER_BACKEND_URL: ${{ secrets.RENDER_BACKEND_URL }}
        run: python scripts/keep_alive.py